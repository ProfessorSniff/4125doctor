{% extends 'base.html' %}

{% block title %}Book Appointment{% endblock %}

{% block content %}
    <h2>Schedule an Appointment</h2>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Appointment</button>
        <button type="button" onclick="history.back()">Cancel</button>
    </form>
{% endblock content %}
