<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Doctor's Office{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/digitallytailored/classless@latest/classless.min.css">
</head>

<body>
    <nav>
        <div>
            <h1>Doctor's Office 4125</h1> | 
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard_patient' %}">Dashboard</a>
            {% else %}
                <a href="/">Home</a>
            {% endif %}
        </div>
        <div>
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" style="background:none;border:none;padding:0;margin-left:15px;color:#ff6b6b;cursor:pointer;">Logout</button>
                    </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>

</body>
</html>
